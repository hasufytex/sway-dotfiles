# Catppuccin Mocha — gsettings + gtk.css are handled by toggle_theme.sh
bar {
    status_command i3status -c ~/.config/i3status/config
    colors {
        background #1e1e2e
        statusline #cdd6f4
        separator  #45475a
        focused_workspace  #89b4fa #89b4fa #1e1e2e
        active_workspace   #313244 #313244 #cdd6f4
        inactive_workspace #181825 #181825 #a6adc8
        urgent_workspace   #f38ba8 #f38ba8 #1e1e2e
    }
}
