# Catppuccin Latte — gsettings + gtk.css are handled by toggle_theme.sh
bar {
    status_command i3status -c ~/.config/i3status/config
    colors {
        background #eff1f5
        statusline #4c4f69
        separator  #bcc0cc
        focused_workspace  #1e66f5 #1e66f5 #eff1f5
        active_workspace   #ccd0da #ccd0da #4c4f69
        inactive_workspace #e6e9ef #e6e9ef #6c6f85
        urgent_workspace   #d20f39 #d20f39 #eff1f5
    }
}
