exec_always --no-startup-id xsetroot -solid "#e8e8e8"
exec_always --no-startup-id gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita'
exec_always --no-startup-id gsettings set org.gnome.desktop.interface color-scheme 'default'

bar {
    status_command i3status -c ~/.config/i3status/config
    colors {
        background #f0f0f0
        statusline #333333
        separator  #999999
        focused_workspace  #4a90d9 #4a90d9 #ffffff
        active_workspace   #cccccc #cccccc #333333
        inactive_workspace #e8e8e8 #e8e8e8 #666666
        urgent_workspace   #cc0000 #cc0000 #ffffff
    }
}
