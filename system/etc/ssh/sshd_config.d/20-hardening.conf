# SSH hardening for a publicly port-forwarded sshd: key-only auth, no root, single
# user. Loaded via the `Include /etc/ssh/sshd_config.d/*.conf` line in the stock
# /etc/ssh/sshd_config. Installed by setup.sh.
#
# Prereq: ~/.ssh/authorized_keys must contain your public key BEFORE this takes
# effect, or password login is gone and you're locked out (Tailscale SSH still
# works as a fallback regardless of this file).

PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey

AllowUsers hasu
MaxAuthTries 3
LoginGraceTime 20
X11Forwarding no
