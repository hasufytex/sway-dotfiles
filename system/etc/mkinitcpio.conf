# mkinitcpio config for this machine.
#
# Deliberately NO `kms` hook and an empty MODULES line. This box runs the
# proprietary nvidia-open driver, and early-loading any DRM driver into the
# initramfs — nouveau via the `kms` hook, or nvidia via MODULES — drags ~100M of
# GSP firmware along with it. /boot is a 196M EFI partition, so that firmware
# alone fills it and breaks the next kernel update. nvidia loads normally after
# root is mounted instead (firmware read from /usr/lib/firmware, never copied to
# /boot); the driver defaults to modeset=1 once loaded, so the desktop is
# unaffected. The only thing lost is flicker-free early-KMS console, which is
# cosmetic. setup.sh regenerates the initramfs (`mkinitcpio -P`) after installing
# this file, since the kernel package already built one with the stock config.
MODULES=()
BINARIES=()
FILES=()
HOOKS=(base systemd autodetect microcode modconf keyboard sd-vconsole block filesystems fsck)
