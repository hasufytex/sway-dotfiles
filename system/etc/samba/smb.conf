# Samba: standalone server for LAN file transfer (incl. iOS Files app).
# Arch's samba package ships no smb.conf; installed to /etc/samba/smb.conf by
# setup.sh. The LAN is already trusted by the nftables ruleset (port 445 open).

[global]
   workgroup = WORKGROUP
   server string = %h
   server role = standalone server
   map to guest = never
   ; SMB1 is insecure; iOS speaks SMB2/3
   min protocol = SMB2

   ; iOS / macOS interoperability (vfs_fruit ships with samba)
   vfs objects = fruit streams_xattr
   fruit:metadata = stream
   fruit:posix_rename = yes
   fruit:veto_appledouble = no
   fruit:nfs_aces = no

   log file = /var/log/samba/%m.log
   max log size = 1000

[phone]
   comment = Phone transfers
   path = /srv/samba/phone
   valid users = hasu
   read only = no
   create mask = 0644
   directory mask = 0755
