#!/usr/bin/nft -f
# Default-deny inbound. Only specific services are exposed, and only to the home
# LAN subnet (defense-in-depth: a compromised/guest LAN device can reach SSH and
# Samba, nothing else). Installed to /etc/nftables.conf by setup.sh. Based on
# Arch's "Simple & Safe" ruleset.

define LAN = 192.168.100.0/24

destroy table inet filter
table inet filter {
  chain input {
    type filter hook input priority filter
    policy drop

    ct state invalid drop comment "early drop of invalid connections"
    ct state {established, related} accept comment "allow tracked connections"
    iif lo accept comment "allow from loopback"
    meta l4proto { icmp, icmpv6 } accept comment "allow icmp"
    ip saddr $LAN tcp dport { 22, 445 } accept comment "ssh + samba from LAN"
    ip saddr $LAN udp dport 5353 accept comment "mDNS (avahi) share discovery"
    iifname "tailscale0" accept comment "allow all tailnet traffic (incl. tailscale ssh)"
    udp dport 41641 accept comment "tailscale direct connections (NAT traversal)"
    pkttype host limit rate 5/second counter reject with icmpx type admin-prohibited
    counter
  }
  chain forward {
    type filter hook forward priority filter
    policy drop
  }
}
