[manager]
cwd = { fg = "#d4d4d4" }
hovered         = { fg = "#ffffff", bg = "#264f78" }
preview_hovered = { underline = true }
find_keyword  = { fg = "#ffffff", bg = "#264f78", bold = true }
find_position = { fg = "#d4d4d4", bg = "reset", italic = true }
marker_selected = { fg = "#ffffff", bg = "#264f78" }
marker_copied   = { fg = "#ffffff", bg = "#2d5f3f" }
marker_cut      = { fg = "#ffffff", bg = "#5f2d2d" }
tab_active   = { fg = "#ffffff", bg = "#264f78" }
tab_inactive = { fg = "#d4d4d4", bg = "#1e1e1e" }
tab_width    = 1
border_symbol = "│"
border_style  = { fg = "#333333" }



[input]
border   = { fg = "#264f78" }
title    = {}
value    = {}
selected = { reversed = true }

[select]
border   = { fg = "#264f78" }
active   = { fg = "#ffffff", bg = "#264f78" }
inactive = {}

[tasks]
border  = { fg = "#264f78" }
title   = {}
hovered = { underline = true }

[which]
cols = 3
mask            = { bg = "#1e1e1e" }
cand            = { fg = "#d4d4d4" }
rest            = { fg = "#666666" }
desc            = { fg = "#d4d4d4" }
separator       = "  "
separator_style = { fg = "#333333" }

[help]
on      = { fg = "#ffffff" }
run     = { fg = "#264f78" }
desc    = { fg = "#d4d4d4" }
hovered = { bg = "#264f78", bold = true }
footer  = { fg = "#1e1e1e", bg = "#d4d4d4" }

[filetype]
rules = [
    { mime = "image/*", fg = "#2d5f3f" },
    { mime = "video/*", fg = "#d4d4d4" },
    { mime = "audio/*", fg = "#d4d4d4" },
    { mime = "application/*zip", fg = "#5f2d2d" },
    { mime = "application/x-tar", fg = "#5f2d2d" },
    { mime = "application/x-bzip*", fg = "#5f2d2d" },
    { mime = "application/x-7z-compressed", fg = "#5f2d2d" },
    { mime = "application/x-rar", fg = "#5f2d2d" },
    { name = "*", fg = "#d4d4d4" },
    { name = "*/", fg = "#264f78" }
]

