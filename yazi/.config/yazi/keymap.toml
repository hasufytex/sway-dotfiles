[[manager.prepend_keymap]]
on = [ "<Enter>" ]
run = "ya emit accept"
desc = "Accept the current selection (file or directory) and close Yazi"

[[manager.prepend_keymap]]
on = [ "l" ]
run = "plugin smart-enter"
desc = "Enter the child directory without selecting it"

[[manager.prepend_keymap]]
on = [ "<Right>" ]
run = "plugin smart-enter"
desc = "Enter the child directory without selecting it"
