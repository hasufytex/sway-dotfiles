# Enter: directory -> go in; file -> edit in nano
[[mgr.prepend_keymap]]
on = [ "<Enter>" ]
run = "plugin smart-open"
desc = "Enter directory, or edit file in nano"

# Right: directory -> cd the terminal into it (quit yazi); file -> edit in nano
[[mgr.prepend_keymap]]
on = [ "<Right>" ]
run = "plugin smart-open -- cd"
desc = "cd into directory (quit), or edit file in nano"

# l: step into directories (built-in, replaces the broken smart-enter)
[[mgr.prepend_keymap]]
on = [ "l" ]
run = "enter"
desc = "Enter the child directory"
