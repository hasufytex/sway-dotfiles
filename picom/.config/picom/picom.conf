backend = "glx";
vsync = true;

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

# Belt-and-braces: kitty already sets background_opacity 0.92 in kitty.conf.
# kitty opacity is set by kitty itself (per-theme); detect-client-opacity respects it.
opacity-rule = [
  "92:class_g = 'i3bar'"
];

# Subtle blur behind transparent windows. Comment out if performance issues on NVIDIA.
blur: {
  method = "dual_kawase";
  strength = 3;
};
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Stability
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
