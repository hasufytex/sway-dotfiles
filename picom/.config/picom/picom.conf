backend = "glx";
vsync = true;

fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

# kitty sets its own per-pixel alpha (background_opacity), honored via
# detect-client-opacity. i3bar uses a depth-24 visual so it can't do per-pixel
# alpha — its opacity-rule is generated per-theme by toggle_theme.sh to match
# kitty, then picom is restarted. See generated opacity.conf (gitignored).
@include "opacity.conf"

# Subtle blur behind transparent windows. Comment out if performance issues on NVIDIA.
blur: {
  method = "dual_kawase";
  strength = 3;
};
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'slop'"
];

# Stability
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = true;
