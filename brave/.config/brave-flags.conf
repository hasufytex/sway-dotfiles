# Enable VA-API hardware video decode on the GL backend (required for NVIDIA)
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL,VaapiIgnoreDriverChecks
--disable-features=UseChromeOSDirectVideoDecoder
# nvidia-vaapi-driver only works via the GL/EGL backend (NOT Vulkan)
--use-gl=angle
--use-angle=gl
# NVIDIA sits on Chromium's video-decode blocklist; override it
--ignore-gpu-blocklist
# General GPU offload for compositing/rasterization
--enable-gpu-rasterization
--enable-zero-copy
