# ---- Output / Decoding ----
vo=gpu-next
gpu-api=d3d11
hwdec=d3d11va

# ---- HDR / Tone Mapping ----
target-colorspace-hint=yes
hdr-compute-peak=yes
tone-mapping=spline
tone-mapping-mode=rgb
target-peak=580
target-contrast=inf
target-min=0

# ---- Levels / Color ----
video-output-levels=full
dither-depth=auto

# ---- Scaling (4K -> downscale) ----
dscale=mitchell
correct-downscaling=yes
linear-downscaling=yes

# ---- Grain / Banding ----
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=20

# ---- Window / Display ----
# shrink video to 1080p-size inside fullscreen, black bars around
video-scale-x=0.75
video-scale-y=0.75
fullscreen=yes
keep-open=yes

# ---- Sync ----
video-sync=audio
