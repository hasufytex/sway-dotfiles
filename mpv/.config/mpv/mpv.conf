# Default: bit-perfect — lock video to native pixel size, centered, no resampling.
video-unscaled=yes

# High-quality downscale (e.g. 4K -> 1440p): ewa_lanczos, clean with no ringing.
# Re-enables scaling, which the bit-perfect default turns off.
[hq-downscale]
video-unscaled=no
dscale=ewa_lanczos
dscale-radius=3
